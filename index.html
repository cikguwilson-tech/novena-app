<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novena to Our Mother of Perpetual Help</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Novena Booklet</h1>
      <p>Our Mother of Perpetual Help</p>
    </header>

    <main class="container">
      <section class="prayer-card">
        <h2 class="prayer-card__title">The Preparatory Prayer</h2>
        <div class="prayer-card__content">
          <p>
            O Most Holy Virgin Mary, who to inspire us with boundless
            confidence...
          </p>
          <p><em>(Pause for silent prayer)</em></p>
        </div>
        <footer class="prayer-card__footer">
          <button class="btn btn--primary">Next Prayer</button>
        </footer>
      </section>
    </main>
  </body>
</html>
